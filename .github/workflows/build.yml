name: Build plugin

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  PLUGIN_NAME: QClaude
  QT_VERSION: 6.10.1
  QT_CREATOR_VERSION: 17.0.2

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: linux-x86_64,
              os: ubuntu-22.04,
              qtc_platform: linux_x64,
            }
          - {
              name: windows-x86_64,
              os: windows-2022,
              qtc_platform: windows_x64,
            }

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-dev

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qt5compat qtshadertools
          cache: true

      - name: Download Qt Creator
        id: qtc
        shell: cmake -P {0}
        run: |
          set(qtc_version "$ENV{QT_CREATOR_VERSION}")
          string(REGEX REPLACE "^([0-9]+\\.[0-9]+).*" "\\1" qtc_minor "${qtc_version}")
          set(qtc_dir "$ENV{GITHUB_WORKSPACE}/qtcreator")
          file(MAKE_DIRECTORY "${qtc_dir}")
          set(base_url "https://download.qt.io/official_releases/qtcreator/${qtc_minor}/${qtc_version}/installer_source/${{ matrix.config.qtc_platform }}")
          foreach(pkg qtcreator qtcreator_dev)
            set(archive "$ENV{GITHUB_WORKSPACE}/${pkg}.7z")
            message(STATUS "Downloading ${base_url}/${pkg}.7z")
            file(DOWNLOAD "${base_url}/${pkg}.7z" "${archive}" SHOW_PROGRESS STATUS dl_status)
            list(GET dl_status 0 dl_code)
            if(NOT dl_code EQUAL 0)
              message(FATAL_ERROR "Download failed: ${dl_status}")
            endif()
            execute_process(
              COMMAND ${CMAKE_COMMAND} -E tar xf "${archive}"
              WORKING_DIRECTORY "${qtc_dir}"
              RESULT_VARIABLE rc
            )
            if(NOT rc EQUAL 0)
              message(FATAL_ERROR "Extract failed for ${pkg}")
            endif()
          endforeach()
          file(APPEND "$ENV{GITHUB_OUTPUT}" "dir=${qtc_dir}\n")

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ steps.qtc.outputs.dir }}" \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build

      - name: Package
        shell: bash
        run: |
          cd install
          7z a "../${PLUGIN_NAME}-${QT_CREATOR_VERSION}-${{ matrix.config.name }}.7z" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ env.QT_CREATOR_VERSION }}-${{ matrix.config.name }}
          path: ${{ env.PLUGIN_NAME }}-${{ env.QT_CREATOR_VERSION }}-${{ matrix.config.name }}.7z

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_NAME }}-${{ env.QT_CREATOR_VERSION }}-${{ matrix.config.name }}.7z
