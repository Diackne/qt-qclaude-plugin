name: CodeQL

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: '31 7 * * 3'

permissions:
  actions: read
  checks: write
  contents: read
  security-events: write

env:
  QT_VERSION: 6.10.1
  QT_CREATOR_VERSION: 17.0.2

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qt5compat qtshadertools
          cache: true

      - name: Download Qt Creator
        id: qtc
        shell: cmake -P {0}
        run: |
          set(qtc_version "$ENV{QT_CREATOR_VERSION}")
          string(REGEX REPLACE "^([0-9]+\\.[0-9]+).*" "\\1" qtc_minor "${qtc_version}")
          set(qtc_dir "$ENV{GITHUB_WORKSPACE}/qtcreator")
          file(MAKE_DIRECTORY "${qtc_dir}")
          set(base_url "https://download.qt.io/official_releases/qtcreator/${qtc_minor}/${qtc_version}/installer_source/linux_x64")
          foreach(pkg qtcreator qtcreator_dev)
            set(archive "$ENV{GITHUB_WORKSPACE}/${pkg}.7z")
            file(DOWNLOAD "${base_url}/${pkg}.7z" "${archive}" SHOW_PROGRESS STATUS dl_status)
            list(GET dl_status 0 dl_code)
            if(NOT dl_code EQUAL 0)
              message(FATAL_ERROR "Download failed: ${dl_status}")
            endif()
            execute_process(
              COMMAND ${CMAKE_COMMAND} -E tar xf "${archive}"
              WORKING_DIRECTORY "${qtc_dir}"
              RESULT_VARIABLE rc
            )
            if(NOT rc EQUAL 0)
              message(FATAL_ERROR "Extract failed for ${pkg}")
            endif()
          endforeach()
          file(APPEND "$ENV{GITHUB_OUTPUT}" "dir=${qtc_dir}\n")

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          source-root: src

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ steps.qtc.outputs.dir }}" \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
