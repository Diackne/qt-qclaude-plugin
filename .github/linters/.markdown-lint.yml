# Line length: disable - prose-heavy README would be unreadable
# wrapped at 80 columns and prose hard-wrapping is not enforced here.
MD013: false

# Unordered list style
MD004:
  style: dash

# Ordered list item prefix: accept either "1./1./1." or "1./2./3.".
MD029:
  style: one_or_ordered

# Spaces after list markers
MD030:
  ul_single: 1
  ol_single: 1
  ul_multi: 1
  ol_multi: 1

# Bare URLs are fine - the README has a couple as plain text.
MD034: false

# Code block style
MD046:
  style: fenced
